<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy-Aware RAG Bot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f0f0f;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: #1a1a1a;
            padding: 48px;
            border-radius: 16px;
            border: 1px solid #2a2a2a;
            text-align: center;
            max-width: 420px;
            width: 100%;
        }
        .badge {
            display: inline-block;
            background: #1a3a2a;
            color: #4ade80;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid #4ade8040;
        }
        h1 { font-size: 24px; margin-bottom: 8px; }
        p { color: #888; margin-bottom: 32px; font-size: 14px; line-height: 1.6; }
        input {
            width: 100%;
            padding: 12px 16px;
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            margin-bottom: 12px;
            outline: none;
        }
        input:focus { border-color: #4ade80; }
        button {
            width: 100%;
            padding: 12px;
            background: #4ade80;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #22c55e; }
        .hint { color: #555; font-size: 13px; margin-top: 16px; }
        .error { color: #f87171; font-size: 13px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge">Auth0 FGA Protected</div>
        <h1>Privacy-Aware RAG Bot</h1>
        <p>An HR knowledge assistant that enforces document-level access based on your role.</p>
        <form method="POST" action="/login">
            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}
            <input type="text" name="username" placeholder="Enter username" autofocus>
            <button type="submit">Login</button>
        </form>
        <p class="hint">Try: nova (manager) or rex (employee)</p>
    </div>
</body>
</html>
